<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Corrida</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f0e;--bg2:#141714;--bg3:#1a1e1a;--b1:#252a25;--b2:#2e342e;--t1:#e8ebe8;--t2:#8a9189;--t3:#4d5a4d;--gr:#4ade80;--gr2:#16a34a;--gr3:#052e16;--grA:rgba(74,222,128,0.08);--pu:#a78bfa;--puA:rgba(167,139,250,0.08);--am:#fbbf24;--amA:rgba(251,191,36,0.08);--re:#f87171;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;min-height:100vh;}
.shell{max-width:920px;margin:0 auto;padding:28px 20px 60px;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.brand h1{font-size:22px;font-weight:500;letter-spacing:-.02em;}
.brand p{font-size:12px;color:var(--t2);font-family:var(--mono);margin-top:3px;}
.acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;padding:8px 14px;border-radius:8px;font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .15s;border:.5px solid;}
.bg{background:transparent;border-color:var(--b2);color:var(--t2);}
.bg:hover{border-color:var(--gr);color:var(--gr);}
.bgr{background:var(--gr);border-color:var(--gr);color:var(--gr3);}
.bgr:hover{background:#6ee7a0;}
.bgr:disabled,.bg:disabled{opacity:.35;cursor:not-allowed;}
.dz{border:.5px dashed var(--b2);border-radius:10px;padding:10px 16px;margin-bottom:10px;font-size:12px;color:var(--t2);text-align:center;cursor:pointer;transition:all .15s;}
.dz:hover,.dz.ov{border-color:var(--gr);color:var(--gr);background:var(--grA);}
.sb{font-size:11px;font-family:var(--mono);border-radius:6px;padding:6px 12px;margin-bottom:12px;display:none;}
.sb.show{display:block;}
.sb.ok{color:var(--gr);background:var(--grA);border:.5px solid rgba(74,222,128,.2);}
.sb.err{color:var(--re);background:rgba(248,113,113,.08);border:.5px solid rgba(248,113,113,.2);}
.tabs{display:flex;border-bottom:.5px solid var(--b1);margin-bottom:22px;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:8px 18px;font-size:13px;font-family:var(--sans);color:var(--t2);cursor:pointer;transition:all .15s;}
.tab.on{border-bottom-color:var(--gr);color:var(--gr);}
.tab:hover:not(.on){color:var(--t1);}
.pane{display:none;}.pane.on{display:block;}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.rc{border:.5px solid;border-radius:10px;padding:16px 18px;}
.rcg{border-color:var(--gr2);background:var(--grA);}
.rcp{border-color:#6d28d9;background:var(--puA);}
.rl{font-size:10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.rcg .rl{color:var(--gr)}.rcp .rl{color:var(--pu);}
.rd{font-size:40px;font-weight:300;letter-spacing:-.03em;line-height:1;}
.rcg .rd{color:var(--gr)}.rcp .rd{color:var(--pu);}
.rs{font-size:11px;margin-top:6px;}
.rcg .rs{color:#4ade8077}.rcp .rs{color:#a78bfa77;}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.kpi{background:var(--bg2);border:.5px solid var(--b1);border-radius:10px;padding:14px 16px;}
.kl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.kv{font-size:24px;font-weight:400;letter-spacing:-.02em;line-height:1.1;}
.ks{font-size:11px;color:var(--t2);margin-top:4px;font-family:var(--mono);}
.cd{background:var(--bg2);border:.5px solid var(--b1);border-radius:10px;padding:18px;margin-bottom:14px;}
.ct{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.bg2g{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px;}
.sbr{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.sbh{display:flex;justify-content:space-between;font-size:11px;}
.sbbg{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;}
.sbf{height:100%;border-radius:2px;}
.rt{width:100%;border-collapse:collapse;font-size:12px;}
.rt th{padding:5px 8px;text-align:left;color:var(--t3);font-weight:400;font-size:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;border-bottom:.5px solid var(--b1);}
.rt td{padding:6px 8px;border-bottom:.5px solid var(--b1);}
.rt tr:hover td{background:var(--bg3);}
.rt tr:last-child td{border-bottom:none;}
.badge{font-size:9px;font-family:var(--mono);font-weight:500;padding:2px 7px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.bi{background:var(--puA);color:var(--pu);border:.5px solid #7c3aed44;}
.bp{background:var(--amA);color:var(--am);border:.5px solid #b4510044;}
.bl{background:var(--grA);color:var(--gr);border:.5px solid var(--gr2);}
.be{background:var(--bg3);color:var(--t3);border:.5px solid var(--b1);}
.mu{color:var(--t2);font-family:var(--mono);}
.pa{font-family:var(--mono);font-weight:500;color:var(--t1);}
.empty{text-align:center;padding:60px 20px;color:var(--t2);}
.empty h2{font-size:16px;font-weight:400;color:var(--t1);margin-bottom:8px;}
.abox{background:var(--bg2);border:.5px solid var(--b1);border-radius:10px;padding:22px;line-height:1.85;font-size:14px;white-space:pre-wrap;}
.ameta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.acc{border:.5px solid var(--b1);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.acch{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;font-size:12px;background:var(--bg2);}
.acch:hover{background:var(--bg3);}
.accb{display:none;padding:16px;font-size:13px;line-height:1.8;white-space:pre-wrap;border-top:.5px solid var(--b1);}
.accb.open{display:block;}
.spwrap{display:flex;align-items:center;gap:10px;padding:40px;justify-content:center;color:var(--t2);font-size:13px;}
@keyframes spin{to{transform:rotate(360deg);}}
.sp{width:18px;height:18px;border:2px solid var(--b1);border-top-color:var(--gr);border-radius:50%;animation:spin .8s linear infinite;}
.tw{max-height:480px;overflow-y:auto;border:.5px solid var(--b1);border-radius:10px;}
.st{width:100%;border-collapse:collapse;font-size:12px;}
.st th{padding:6px 8px;text-align:left;color:var(--t3);font-weight:400;font-size:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;border-bottom:.5px solid var(--b1);position:sticky;top:0;background:var(--bg);}
.st td{padding:6px 8px;border-bottom:.5px solid var(--b1);}
.st tr:hover td{background:var(--bg3);}
.stp{background:var(--bg2);border:.5px solid var(--b1);border-radius:10px;padding:22px;max-width:600px;}
.stp h3{font-size:14px;font-weight:500;margin-bottom:5px;}
.desc{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.6;}
.step{display:flex;gap:8px;font-size:13px;margin-bottom:8px;}
.sn{font-size:10px;background:var(--grA);color:#085041;padding:2px 8px;border-radius:4px;white-space:nowrap;align-self:flex-start;margin-top:2px;}
.fi label{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-family:var(--mono);}
.fi input{width:100%;background:var(--bg3);border:.5px solid var(--b2);border-radius:6px;padding:8px 12px;font-size:12px;font-family:var(--mono);color:var(--t1);outline:none;}
.fi input:focus{border-color:var(--gr);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.dv{border:none;border-top:.5px solid var(--b1);margin:16px 0;}
.cb{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--gr);background:var(--grA);border:.5px solid var(--gr2);border-radius:6px;padding:4px 10px;}
@media(max-width:640px){.kg{grid-template-columns:repeat(2,1fr);}.rg{grid-template-columns:1fr;}.bg2g{grid-template-columns:1fr;}.fg{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="shell">
<div class="hdr">
  <div class="brand">
    <h1>Painel de corrida</h1>
    <p id="ml">carregando...</p>
  </div>
  <div class="acts">
    <button class="btn bg" onclick="document.getElementById('fi').click()">+ Importar</button>
    <button class="btn bg" id="bsync" style="display:none" onclick="stravaSync()">⟳ Sync Strava</button>
    <button class="btn bgr" id="bana" disabled onclick="runAnalysis()">Analisar com Claude ↗</button>
  </div>
</div>
<input type="file" id="fi" accept=".csv,.gpx" multiple style="display:none" onchange="handleFiles(this.files);this.value=''">
<div class="dz" id="dz"
  ondragover="event.preventDefault();this.classList.add('ov')"
  ondragleave="this.classList.remove('ov')"
  ondrop="event.preventDefault();this.classList.remove('ov');handleFiles(event.dataTransfer.files)"
  onclick="document.getElementById('fi').click()">
  Arraste <strong>.gpx</strong> (Strava app → ⋯ → Compartilhar → Exportar) ou <strong>activities.csv</strong> (export mensal)
</div>
<div class="sb" id="sb"></div>
<div class="tabs">
  <button class="tab on" onclick="showTab('dash',this)">Dashboard</button>
  <button class="tab" onclick="showTab('ana',this)">Análise Claude</button>
  <button class="tab" onclick="showTab('str',this)">⟳ Strava</button>
  <button class="tab" onclick="showTab('ses',this)">Corridas</button>
</div>
<div class="pane on" id="pane-dash"><div id="dc"></div></div>
<div class="pane" id="pane-ana"><div id="ac"></div></div>
<div class="pane" id="pane-str"><div id="sc"></div></div>
<div class="pane" id="pane-ses"><div id="sec"></div></div>
</div>

<script>
const MPT={jan:'01',fev:'02',mar:'03',abr:'04',mai:'05',jun:'06',jul:'07',ago:'08',set:'09',out:'10',nov:'11',dez:'12'};
function ptDate(s){const m=String(s||'').toLowerCase().match(/(\d{1,2}) de ([a-zç]+)\.? de (\d{4})/);if(!m)return null;const mn=MPT[m[2].replace(/\./g,'').substring(0,3)];return mn?`${m[3]}-${mn}-${m[1].padStart(2,'0')}`:null;}
function ps(p){if(!p||p<=0||p>20)return'--';return`${Math.floor(p)}:${String(Math.round((p%1)*60)).padStart(2,'0')}`;}
function du(d){return Math.ceil((new Date(d+'T12:00:00')-new Date())/864e5);}
function wkey(d){const dt=new Date(d+'T12:00:00'),dy=dt.getDay(),df=dt.getDate()-dy+(dy===0?-6:1);return new Date(new Date(d+'T12:00:00').setDate(df)).toISOString().split('T')[0];}
function cls(r){if(/tiro|repeti|\dx\d|fartlek/i.test(r.name||''))return'interval';if(r.dist_km>=14)return'long';if([2,4].includes(r.weekday)&&r.dist_km>=7&&r.dist_km<=14){if((r.hr_max-r.hr_avg)>=18&&r.hr_max>=178)return'interval';if(r.hr_max>=174&&r.dist_km>=8)return'progressive';}return'easy';}
function csvRow(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}return[...r,c.trim()];}
function hav(a,b,c,d){const R=6371000,r=Math.PI/180,dL=(c-a)*r,dO=(d-b)*r,e=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));}

const SL={interval:'Tiro',progressive:'Progressivo',long:'Longão',easy:'Rodagem'};
const SC={interval:'#a78bfa',progressive:'#fbbf24',long:'#4ade80',easy:'#4d5a4d'};
const BC={interval:'bi',progressive:'bp',long:'bl',easy:'be'};

function parseCSV(txt){
  const lines=txt.split('\n');if(lines.length<2)return[];
  const H=csvRow(lines[0]),col=n=>H.findIndex(h=>h.includes(n));
  const iD=col('Data da atividade'),iN=col('Nome da atividade'),iT=col('Tipo de atividade');
  const iDi=col('Distância'),iM=col('Tempo de movimentação'),iE=col('Tempo decorrido');
  const iHa=col('Frequência cardíaca média');
  const iHm=H.reduce((a,h,i)=>{if(h.includes('Frequência cardíaca máxima'))a.push(i);return a;},[]).at(-1)??-1;
  const runs=[];
  for(let i=1;i<lines.length;i++){
    const row=csvRow(lines[i]);
    if(!row||row.length<5||(row[iT]||'').trim()!=='Corrida')continue;
    const date=ptDate(row[iD]);if(!date)continue;
    const dist=parseFloat((row[iDi]||'0').replace(',','.'));if(dist<2)continue;
    const ms=parseInt(row[iM])||parseInt(row[iE])||0;
    const ha=parseFloat(row[iHa])||0,hm=parseFloat(row[iHm])||0;
    const run={date,name:row[iN]||'',dist_km:dist,moving_sec:ms,pace_min_km:ms>0&&dist>0?(ms/60)/dist:0,hr_avg:ha,hr_max:hm,weekday:new Date(date+'T12:00:00').getDay()};
    run.type=cls(run);runs.push(run);
  }
  return runs;
}

async function parseGPX(file){
  const txt=await file.text();
  const doc=new DOMParser().parseFromString(txt,'text/xml');
  const name=doc.querySelector('name')?.textContent?.trim()||file.name.replace('.gpx','');
  const pts=[...doc.querySelectorAll('trkpt')];if(pts.length<2)return null;
  const times=pts.map(p=>new Date(p.querySelector('time')?.textContent||0)).filter(t=>t.getTime()>0);
  const dur=times.length>1?(times.at(-1)-times[0])/1000:0;
  const date=times[0]?.toISOString().split('T')[0]||new Date().toISOString().split('T')[0];
  let dist=0;for(let i=1;i<pts.length;i++)dist+=hav(+pts[i-1].getAttribute('lat'),+pts[i-1].getAttribute('lon'),+pts[i].getAttribute('lat'),+pts[i].getAttribute('lon'));
  const hrEls=[...doc.querySelectorAll('hr,gpxtpx\\:hr,ns3\\:hr')];
  const hrV=hrEls.map(e=>+e.textContent).filter(v=>v>30&&v<220);
  const ha=hrV.length?Math.round(hrV.reduce((s,v)=>s+v,0)/hrV.length):0,hm=hrV.length?Math.max(...hrV):0;
  const dk=dist/1000;
  const run={date,name,dist_km:dk,moving_sec:dur,pace_min_km:dur>0&&dk>0?(dur/60)/dk:0,hr_avg:ha,hr_max:hm,weekday:new Date(date+'T12:00:00').getDay()};
  run.type=cls(run);return run;
}

function merge(incoming){
  const keys=new Set(RUNS.map(r=>r.date+'_'+r.dist_km.toFixed(1)));
  const toAdd=incoming.filter(r=>!keys.has(r.date+'_'+r.dist_km.toFixed(1)));
  RUNS=[...RUNS,...toAdd].sort((a,b)=>a.date.localeCompare(b.date));
  save();return toAdd.length;
}

async function tryRefresh(){
  const c=gc();
  if(!c.rt||c.rt==='manual'||!c.cid||!c.cs)throw new Error('Token expirado. Cole um novo Access Token na aba Strava.');
  const body=JSON.stringify({client_id:c.cid,client_secret:c.cs,refresh_token:c.rt,grant_type:'refresh_token'});
  for(const u of['https://corsproxy.io/?url='+encodeURIComponent('https://www.strava.com/oauth/token'),'https://api.allorigins.win/raw?url='+encodeURIComponent('https://www.strava.com/oauth/token')]){
    try{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body,signal:AbortSignal.timeout(7000)});
    if(r.ok){const d=await r.json();if(d.access_token){sc2({at:d.access_token,rt:d.refresh_token||c.rt,exp:d.expires_at,cid:c.cid,cs:c.cs});return d.access_token;}}}catch(e){}
  }
  throw new Error('Token expirado. Cole um novo Access Token na aba Configurações.');
}
async function getToken(){
  const c=gc();if(!c.at)throw new Error('Configure o Strava nas Configurações.');
  if(Date.now()/1000<c.exp-120)return c.at;
  return tryRefresh();
}

function last(days){const c=new Date();c.setDate(c.getDate()-days);return RUNS.filter(r=>new Date(r.date)>=c);}

function stats(){
  const l90=last(90),l30=last(30);
  const l30p=RUNS.filter(r=>{const c=new Date();c.setDate(c.getDate()-60);const c2=new Date();c2.setDate(c2.getDate()-30);const d=new Date(r.date);return d>=c&&d<c2;});
  const v30=l30.reduce((s,r)=>s+r.dist_km,0),v30p=l30p.reduce((s,r)=>s+r.dist_km,0);
  const lng=RUNS.filter(r=>r.dist_km>=14&&r.pace_min_km>3&&r.pace_min_km<8);
  const ints=l90.filter(r=>r.type==='interval'),prgs=l90.filter(r=>r.type==='progressive');
  const bp=prgs.length?Math.min(...prgs.map(r=>r.pace_min_km).filter(p=>p>3)):null;
  const sct={interval:0,progressive:0,long:0,easy:0};l90.forEach(r=>sct[r.type]=(sct[r.type]||0)+1);
  const wks={};l90.forEach(r=>{const w=wkey(r.date);if(!wks[w])wks[w]={week:r.date.slice(5,7)+'/'+r.date.slice(8),km:0};wks[w].km+=r.dist_km;});
  const wv=Object.values(wks).sort((a,b)=>a.week.localeCompare(b.week));
  const pt=lng.slice(-16).map(r=>({date:r.date.slice(5),pace:r.pace_min_km,hr:r.hr_avg||null}));
  // Zone pace data by month
  const allRuns6m=RUNS.filter(r=>{const c=new Date();c.setDate(c.getDate()-180);return new Date(r.date)>=c&&r.dist_km>=5&&r.pace_min_km>3&&r.pace_min_km<8&&r.hr_avg>0;});
  const zoneMap={'Z2 ≤162':[0,162],'Z3 163-170':[163,170],'Z4 171-177':[171,177]};
  const zoneData={};
  allRuns6m.forEach(r=>{
    const month=r.date.slice(0,7);
    if(!zoneData[month])zoneData[month]={};
    Object.entries(zoneMap).forEach(([zn,[lo,hi]])=>{
      if(r.hr_avg>=lo&&r.hr_avg<=hi){
        if(!zoneData[month][zn])zoneData[month][zn]=[];
        zoneData[month][zn].push(r.pace_min_km);
      }
    });
  });
  // Convert arrays to averages
  Object.keys(zoneData).forEach(m=>{Object.keys(zoneData[m]).forEach(z=>{const arr=zoneData[m][z];zoneData[m][z]=arr.reduce((s,v)=>s+v,0)/arr.length;});});

  // Drift data for long runs
  const driftData=lng.slice(-10).filter(r=>r.hr_max>0&&r.hr_avg>0).map(r=>({date:r.date.slice(5),drift:r.hr_max/r.hr_avg,pace:r.pace_min_km}));

  return{l90,v30,v30p,vt:v30p>0?((v30-v30p)/v30p*100):0,lng,ints,prgs,ll:lng.at(-1)||null,li:ints.at(-1)||null,bp,sct,wv,pt,tot:l90.length||1,zoneData,driftData};
}

let PC=null,VC=null,ZC=null,DC=null;

function buildCharts(s){

    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...tt,callbacks:{label:c=>c.dataset.label==='pace'?'Pace: '+ps(c.parsed.y)+'/km':'FC: '+Math.round(c.parsed.y)+' bpm'}}},scales:{yP:{type:'linear',position:'left',reverse:true,min:4.3,max:5.7,ticks:{...tc,callback:v=>ps(v)},grid:{color:gclr},border:{display:false}},yH:{type:'linear',position:'right',min:150,max:185,ticks:{...tc,color:'#f8717155'},grid:{display:false},border:{display:false}},x:{ticks:tc,grid:{display:false},border:{display:false}}}}});
  }

  // ── Volume chart ──────────────────────────────────────────────────────────
  const ve=document.getElementById('cv');
  if(ve&&s.wv.length>1){
    VC=new Chart(ve,{type:'bar',data:{labels:s.wv.map(w=>w.week),datasets:[{data:s.wv.map(w=>w.km),backgroundColor:'rgba(74,222,128,0.3)',borderColor:'rgba(74,222,128,0.6)',borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...tt,callbacks:{label:c=>c.parsed.y.toFixed(0)+' km'}}},scales:{y:{ticks:tc,grid:{color:gclr},border:{display:false}},x:{ticks:{...tc,maxRotation:45},grid:{display:false},border:{display:false}}}}});
  }

  // ── Zone pace evolution chart ─────────────────────────────────────────────
  const ze=document.getElementById('cz');
  if(ze){
    try{
      // Compute zone data directly from RUNS
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-210);
      const runs6m=RUNS.filter(r=>new Date(r.date)>=cutoff&&r.dist_km>=5&&r.pace_min_km>3.5&&r.pace_min_km<8&&r.hr_avg>=140);
      
      // Simple numeric zones
      const ZONES=[
        {name:'Facil (FC<163)',lo:0,hi:162,color:'#4ade80'},
        {name:'Moderado (163-170)',lo:163,hi:170,color:'#fbbf24'},
        {name:'Forte (171+)',lo:171,hi:999,color:'#f87171'}
      ];
      
      // Group by month
      const byMonth={};
      runs6m.forEach(r=>{
        const m=r.date.slice(0,7);
        if(!byMonth[m])byMonth[m]={};
        ZONES.forEach(z=>{
          if(r.hr_avg>=z.lo&&r.hr_avg<=z.hi){
            if(!byMonth[m][z.name])byMonth[m][z.name]=[];
            byMonth[m][z.name].push(r.pace_min_km);
          }
        });
      });
      
      const months=Object.keys(byMonth).sort();
      
      if(months.length>=2){
        const datasets=ZONES.map(z=>({
          label:z.name,
          data:months.map(m=>{
            const arr=byMonth[m][z.name];
            return arr&&arr.length>0?arr.reduce((a,b)=>a+b,0)/arr.length:null;
          }),
          borderColor:z.color,
          backgroundColor:'transparent',
          borderWidth:2.5,
          pointRadius:5,
          pointBackgroundColor:z.color,
          tension:0.3,
          spanGaps:true
        })).filter(d=>d.data.some(v=>v!==null));
        
        const allPaces=months.flatMap(m=>ZONES.flatMap(z=>(byMonth[m][z.name]||[])));
        const minP=Math.min(...allPaces)-0.1;
        const maxP=Math.max(...allPaces)+0.1;
        
        if(ZC)ZC.destroy();
        ZC=new Chart(ze,{
          type:'line',
          data:{labels:months.map(m=>{const[y,mo]=m.split('-');return mo+'/'+y.slice(2);}),datasets},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{display:true,position:'top',labels:{color:'#8a9189',font:{size:10,family:'DM Mono'},boxWidth:10,padding:10,usePointStyle:true}},
              tooltip:{...tt,callbacks:{label:c=>'  '+c.dataset.label+': '+ps(c.parsed.y)+'/km'}}
            },
            scales:{
              y:{reverse:true,min:Math.max(4.5,minP-0.05),max:Math.min(6.2,maxP+0.05),
                ticks:{...tc,callback:v=>ps(v)},grid:{color:gclr},border:{display:false}},
              x:{ticks:tc,grid:{display:false},border:{display:false}}
            }
          }
        });
      } else {
        ze.parentElement.innerHTML='<p style="font-size:12px;color:var(--t3);padding:20px 0;text-align:center">Dados insuficientes (minimo 2 meses com FC registrada)</p>';
      }
    }catch(err){
      console.error('Zone chart error:',err);
      ze.parentElement.innerHTML='<p style="font-size:12px;color:var(--re);padding:20px 0">Erro: '+err.message+'</p>';
    }
  }

  // ── Cardiac drift chart ───────────────────────────────────────────────────
  const de=document.getElementById('cd');
  if(de){
    try{
      const driftRuns=RUNS.filter(r=>r.dist_km>=14&&r.hr_max>0&&r.hr_avg>0&&r.pace_min_km>3.5&&r.pace_min_km<8).slice(-12);
      
      if(driftRuns.length>=3){
        if(DC)DC.destroy();
        DC=new Chart(de,{
          type:'line',
          data:{
            labels:driftRuns.map(r=>r.date.slice(5)),
            datasets:[
              {label:'Drift FC (%)',data:driftRuns.map(r=>parseFloat(((r.hr_max/r.hr_avg-1)*100).toFixed(1))),
                borderColor:'#f87171',backgroundColor:'rgba(248,113,113,0.08)',borderWidth:2,
                pointRadius:4,pointBackgroundColor:'#f87171',fill:true,tension:0.3,yAxisID:'yD'},
              {label:'Pace',data:driftRuns.map(r=>r.pace_min_km),
                borderColor:'#4ade80',backgroundColor:'transparent',borderWidth:1.5,
                borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#4ade80',tension:0.3,yAxisID:'yP'}
            ]
          },
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{display:true,position:'top',labels:{color:'#8a9189',font:{size:10,family:'DM Mono'},boxWidth:10,padding:10,usePointStyle:true}},
              tooltip:{...tt,callbacks:{label:c=>c.dataset.yAxisID==='yD'?'  Drift: +'+c.parsed.y.toFixed(1)+'%':'  Pace: '+ps(c.parsed.y)+'/km'}}
            },
            scales:{
              yD:{position:'left',min:3,max:14,ticks:{...tc,callback:v=>'+'+v+'%'},grid:{color:gclr},border:{display:false}},
              yP:{position:'right',reverse:true,min:4.9,max:5.8,ticks:{...tc,callback:v=>ps(v)},grid:{display:false},border:{display:false}},
              x:{ticks:{...tc,maxRotation:45},grid:{display:false},border:{display:false}}
            }
          }
        });
      } else {
        de.parentElement.innerHTML='<p style="font-size:12px;color:var(--t3);padding:20px 0;text-align:center">Dados insuficientes para gráfico de drift</p>';
      }
    }catch(err){
      console.error('Drift chart error:',err);
      de.parentElement.innerHTML='<p style="font-size:12px;color:var(--re);padding:20px 0">Erro: '+err.message+'</p>';
    }
  }
}

    </div>`;

function md2html(text){
  if(!text)return'';
  // Handle markdown tables
  function parseTable(block){
    const rows=block.trim().split('\n').filter(r=>r.includes('|'));
    if(rows.length<2)return block;
    let html='<div style="overflow-x:auto;margin:12px 0"><table style="width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)">';
    rows.forEach((row,i)=>{
      if(row.match(/^\s*\|[-: |]+\|\s*$/))return; // skip separator
      const cells=row.split('|').map(c=>c.trim()).filter((_,j,a)=>j>0&&j<a.length-1);
      const tag=i===0?'th':'td';
      html+='<tr>'+cells.map(c=>`<${tag} style="padding:6px 10px;border:.5px solid var(--b1);${i===0?'color:var(--t3);font-weight:400;text-transform:uppercase;letter-spacing:.05em':'color:var(--t1)'}">${c}</${tag}>`).join('')+'</tr>';
    });
    return html+'</table></div>';
  }
  // Replace table blocks first
  let result=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Find table blocks (lines with |)
  result=result.replace(/((?:^[^\n]*\|[^\n]*\n?)+)/gm,m=>{
    if(m.includes('|')&&m.split('\n').filter(l=>l.includes('|')).length>=2)return parseTable(m);
    return m;
  });
  return result
    .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--t1)">$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm,'<p style="font-size:14px;font-weight:500;color:var(--t1);margin:16px 0 6px;padding-top:8px;border-top:.5px solid var(--b1)">$1</p>')
    .replace(/^\d+\.\s+(.+)$/gm,'<div style="display:flex;gap:8px;margin:8px 0 4px"><span style="color:var(--gr);font-weight:500;flex-shrink:0;min-width:16px">→</span><span>$1</span></div>')
    .replace(/^[-•]\s+(.+)$/gm,'<div style="display:flex;gap:8px;margin-bottom:3px"><span style="color:var(--t3);flex-shrink:0">·</span><span>$1</span></div>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

function buildRacePrediction(text){
  // Extract HM times - look for patterns like 1:38, 1:39, 1:40, 1:41, 1:42, 1:43
  const hmTimes=text.match(/1:[3-4][0-9](?::[0-5][0-9])?/g)||[];
  const maTimes=text.match(/[34]:[0-5][0-9](?::[0-5][0-9])?/g)||[];
  // Filter out HM times from marathon matches
  const maOnly=maTimes.filter(t=>!t.startsWith('1:'));
  const hmReal=hmTimes.length>=2?hmTimes[Math.floor(hmTimes.length/2)]:hmTimes[0]||'1:40';
  const maReal=maOnly.length>=2?maOnly[Math.floor(maOnly.length/2)]:maOnly[0]||'3:50';
  const hmCons=hmTimes.length>0?hmTimes[hmTimes.length-1]:hmReal;
  const hmBest=hmTimes.length>0?hmTimes[0]:hmReal;
  const maCons=maOnly.length>0?maOnly[maOnly.length-1]:maReal;
  const maBest=maOnly.length>0?maOnly[0]:maReal;
  const dPOA=Math.ceil((new Date('2026-05-30T07:00:00')-new Date())/864e5);
  return '<div style="margin:16px 0 20px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">'
    +'<div style="background:var(--grA);border:.5px solid var(--gr2);border-radius:10px;padding:14px 16px">'
    +'<p style="font-size:10px;font-family:var(--mono);color:var(--gr);text-transform:uppercase;letter-spacing:.07em;margin:0 0 4px">Meia · POA · 30/mai</p>'
    +'<p style="font-size:30px;font-weight:300;letter-spacing:-.02em;color:var(--gr);margin:0;line-height:1">'+hmReal+'</p>'
    +'<p style="font-size:11px;color:var(--gr2);margin:5px 0 0;font-family:var(--mono)">'+dPOA+' dias · realista</p></div>'
    +'<div style="background:var(--puA);border:.5px solid #6d28d9;border-radius:10px;padding:14px 16px">'
    +'<p style="font-size:10px;font-family:var(--mono);color:var(--pu);text-transform:uppercase;letter-spacing:.07em;margin:0 0 4px">Maratona · Amsterdam</p>'
    +'<p style="font-size:30px;font-weight:300;letter-spacing:-.02em;color:var(--pu);margin:0;line-height:1">'+maReal+'</p>'
    +'<p style="font-size:11px;color:#7c3aed;margin:5px 0 0;font-family:var(--mono)">out/2026 · realista</p></div>'
    +'</div>'
    +'<div style="background:var(--bg3);border-radius:8px;padding:10px 14px;font-size:11px;font-family:var(--mono);display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:6px 16px;align-items:center">'
    +'<span style="color:var(--t3)">PROVA</span><span style="color:var(--t3)">CONSERVADOR</span><span style="color:var(--t3)">REALISTA</span><span style="color:var(--t3)">DIA PERFEITO</span>'
    +'<span style="color:var(--t2)">Meia POA</span><span style="color:var(--t1)">'+hmCons+'</span><span style="color:var(--gr);font-weight:500">'+hmReal+'</span><span style="color:var(--t1)">'+hmBest+'</span>'
    +'<span style="color:var(--t2)">Maratona</span><span style="color:var(--t1)">'+maCons+'</span><span style="color:var(--pu);font-weight:500">'+maReal+'</span><span style="color:var(--t1)">'+maBest+'</span>'
    +'</div>'
    +'</div>';
}

async function runAnalysis(){
  const ak=localStorage.getItem('ak')||'';
  if(!ak){
    toast('Configure a chave API Claude nas Configurações',true);
    showTab('str',document.querySelectorAll('.tab')[2]);
    return;
  }
  document.getElementById('ac').innerHTML='<div class="spwrap"><div class="sp"></div>Analisando com Claude...</div>';
  showTab('ana',document.querySelectorAll('.tab')[1]);
  const l90=last(90).sort((a,b)=>b.date.localeCompare(a.date));
  const s=stats();
  const lines=l90.map(r=>r.date+' ['+SL[r.type]+'] '+r.dist_km.toFixed(1)+'km '+ps(r.pace_min_km)+'/km FC:'+Math.round(r.hr_avg||0)+'avg/'+Math.round(r.hr_max||0)+'max').join('\n');
  // Build zone and drift summaries
  const _zs=s.zoneData;
  const _zoneSummary=Object.keys(_zs).sort().map(m=>{
    const z=_zs[m];
    return m+': '+Object.entries(z).map(([k,v])=>k+'->'+ps(v)+'/km').join(', ');
  }).join(' | ');
  const _driftSummary=s.driftData.map(d=>'longao '+d.date+' pace '+ps(d.pace)+'/km drift '+(((d.drift-1)*100).toFixed(1))+'%').join(' | ');

  // Today's date and day of week for accurate training recommendations
  const today=new Date();
  const todayStr=today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const daysUntilPOA=Math.ceil((new Date('2026-05-30T07:00:00')-today)/864e5);

  const prompt='Você é um treinador de corrida especialista. Analise com foco em evolução real de performance.\n\n'
    +'DATA DE HOJE: '+todayStr+' ('+daysUntilPOA+' dias até a Meia de POA)\n\n'
    +'ATLETA: PR atual = Meia Maratona POA junho 2025\n'
    +'  Distancia: 21.4km | Tempo: 1:43 | Pace: 4:50/km | FC media: 174 bpm | FC max: ~184 bpm\n'
    +'  Drift cardíaco na prova: ~+6% (FC max/avg)\n\n'
    +'METAS: Meia POA 30 mai 2026 | Maratona Amsterdam out 2026\n'
    +'ESTRUTURA: tiros/progressivos Ter+Qui, longao fim de semana\n\n'
    +'PACE POR ZONA DE FC - treinos atuais (ultimos 6 meses, por mes):\n'+_zoneSummary+'\n\n'
    +'DRIFT CARDÍACO NOS LONGOES atuais:\n'+_driftSummary+'\n\n'
    +'ULTIMAS '+l90.length+' CORRIDAS (90 dias):\n'+lines+'\n\n'
    +'RESUMO ATUAL: '+s.ints.length+' tiros | '+s.prgs.length+' progressivos | '+s.v30.toFixed(0)+'km/mes'
    +(s.ll?' | ultimo longao: '+s.ll.dist_km.toFixed(1)+'km '+ps(s.ll.pace_min_km)+'/km FC'+Math.round(s.ll.hr_avg):'')
    +(s.bp?' | melhor progressivo: '+ps(s.bp)+'/km':'')
    +'\n\nResponda em portugues, texto limpo com **negrito** para destaques. ESTRUTURA OBRIGATORIA:\n\n'
    +'1. **Comparacao FC: treinos longos atuais vs prova PR (POA 2025)**\n'
    +'   Compare as zonas de FC e drift dos longoes atuais com os dados da prova de PR.\n'
    +'   O que melhorou? O que isso significa para o pace sustentavel na proxima prova?\n\n'
    +'2. **Tabela de ritmos previstos** (formato markdown de tabela)\n'
    +'   | Prova | Conservador | Realista | Dia perfeito |\n'
    +'   | Meia POA (30/mai) | X:XX (X:XX/km) | X:XX (X:XX/km) | X:XX (X:XX/km) |\n'
    +'   | Maratona Amsterdam | X:XX (X:XX/km) | X:XX (X:XX/km) | X:XX (X:XX/km) |\n\n'
    +'3. **Proximo treino de qualidade** (considere que hoje é '+todayStr+')\n'
    +'   Qual o proximo dia de treino de qualidade e o que fazer. Seja especifico: distancia, pace alvo, FC alvo.\n\n'
    +'4. **Foco das proximas 2 semanas ate a prova**\n'
    +'   Orientacoes gerais de taper considerando '+daysUntilPOA+' dias ate a prova.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ak,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){const e=await res.json();throw new Error((e.error?.message)||'Erro '+res.status);}
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'Sem resposta.';
    const entry={date:new Date().toISOString().split('T')[0],text,rc:l90.length,v:s.v30.toFixed(0)};
    ANALYSES=[...ANALYSES,entry];saveA();rdAna();
  }catch(e){
    document.getElementById('ac').innerHTML='<div class="empty"><h2>Erro</h2><p>'+e.message+'</p>'+(e.message.includes('401')||e.message.includes('invalid')?'<p style="margin-top:8px;font-size:12px;color:var(--t2)">Verifique sua chave API nas Configurações</p>':'')+'</div>';
  }
}

load();
render();
</script>
